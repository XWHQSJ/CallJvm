name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest]
        jdk: [17, 21]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.jdk }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.jdk }}
          distribution: temurin

      - name: Configure CMake
        run: cmake -B build -S callJvmThreadpool -DCALLJVM_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

  sanitizers:
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [asan, ubsan, tsan]
        include:
          - sanitizer: asan
            cmake_flags: "-fsanitize=address -fno-omit-frame-pointer"
            env_vars: "ASAN_OPTIONS=detect_leaks=1:abort_on_error=1"
          - sanitizer: ubsan
            cmake_flags: "-fsanitize=undefined -fno-omit-frame-pointer"
            env_vars: "UBSAN_OPTIONS=print_stacktrace=1:halt_on_error=1"
          - sanitizer: tsan
            cmake_flags: "-fsanitize=thread -fno-omit-frame-pointer"
            env_vars: "TSAN_OPTIONS=second_deadlock_stack=1:halt_on_error=1"
    runs-on: ubuntu-latest
    name: sanitizer-${{ matrix.sanitizer }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin

      - name: Configure CMake (${{ matrix.sanitizer }})
        run: |
          cmake -B build -S callJvmThreadpool \
            -DCALLJVM_BUILD_TESTS=ON \
            -DCMAKE_CXX_FLAGS="${{ matrix.cmake_flags }}" \
            -DCMAKE_EXE_LINKER_FLAGS="${{ matrix.cmake_flags }}"

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run tests (${{ matrix.sanitizer }})
        run: |
          export ASAN_OPTIONS="detect_leaks=1:abort_on_error=1"
          export UBSAN_OPTIONS="print_stacktrace=1:halt_on_error=1"
          export TSAN_OPTIONS="second_deadlock_stack=1:halt_on_error=1"
          ctest --test-dir build --output-on-failure

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin

      - name: Install Clang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Configure CMake (fuzz)
        run: |
          cmake -B build -S callJvmThreadpool \
            -DENABLE_FUZZ=ON \
            -DCALLJVM_BUILD_TESTS=OFF \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++

      - name: Build fuzzer
        run: cmake --build build --target fuzz_frame -j$(nproc)

      - name: Run fuzzer (60 seconds)
        run: |
          mkdir -p fuzz_corpus fuzz_artifacts
          ./build/fuzz_frame fuzz_corpus \
            -artifact_prefix=fuzz_artifacts/ \
            -max_total_time=60 \
            -max_len=65536 \
            || true

      - name: Check for crashes
        run: |
          if ls fuzz_artifacts/crash-* 1>/dev/null 2>&1; then
            echo "::error::Fuzzer found crashes!"
            ls -la fuzz_artifacts/
            exit 1
          fi
          echo "No crashes found."

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes
          path: fuzz_artifacts/
          retention-days: 30
